{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Link Sent - ASL Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('{% static "images/bg.png" %}') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-container {
            background: #f5e6c8;
            border: 4px solid #8b7355;
            padding: 35px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
        }
        
        .game-icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 15px;
            display: block;
        }
        
        h1 {
            font-family: 'Press Start 2P', cursive;
            color: #8b7355;
            font-size: 16px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 25px;
            font-size: 12px;
        }
        
        .success-icon {
            font-size: 64px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .info-text {
            color: #666;
            font-size: 12px;
            margin-bottom: 20px;
            line-height: 1.5;
            text-align: center;
        }
        
        .home-link {
            position: absolute;
            top: 20px;
            left: 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: white;
            text-decoration: none;
            background: #4a90e2;
            border: 2px solid #357abd;
            padding: 15px 20px;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.3);
        }
        
        .home-link:hover {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 rgba(0,0,0,0.3);
        }
        
        .action-btn {
            width: 100%;
            padding: 14px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            background: #27ae60;
            border: 2px solid #1a8a4b;
            color: white;
            cursor: pointer;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
            transition: all 0.1s;
            margin-top: 10px;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        
        .action-btn:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <!-- Audio Elements -->
    <audio id="bgmAudio" loop preload="auto">
        <source src="{% static 'audio/bgm.mp3' %}" type="audio/mpeg">
    </audio>
    <audio id="buttonSound" preload="auto">
        <source src="{% static 'audio/buttons.mp3' %}" type="audio/mpeg">
    </audio>
    <a href="{% url 'login' %}" class="home-link">&larr; BACK</a>
    
    <div class="auth-container">
        <span class="game-icon">&#128274;</span>
        <h1>Check Your Email</h1>
        <p class="subtitle">Reset link sent!</p>
        
        <div class="success-icon">&#128231;</div>
        
        <p class="info-text">
            We have sent you an email. If you have not received it, please check your spam folder. 
            Otherwise, contact us if you do not receive it within a few minutes.
        </p>
        
        <a href="{% url 'login' %}" class="action-btn">Back to Login</a>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const bgmAudio = document.getElementById('bgmAudio');
            const buttonSound = document.getElementById('buttonSound');
            const buttons = document.querySelectorAll('a, button');
            
            buttons.forEach(button => {
                button.addEventListener('click', function() {
                    buttonSound.currentTime = 0;
                    buttonSound.volume = 0.5;
                    buttonSound.play().catch(() => {});
                });
            });
            
            // BGM
            bgmAudio.volume = 0.3;
            bgmAudio.play().catch(() => {});
        });
    </script>
</body>
</html>
