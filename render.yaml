services:
  # Web service for Django application
  - type: web
    name: asl-learning-app
    runtime: python
    version: "3.11"
    buildCommand: "./build.sh"
    startCommand: "gunicorn asl_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 60"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: asl-db
          property: connectionString
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_REGION_NAME
        value: ap-southeast-1
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@asl-learning.com
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
    healthCheckPath: /health/
    autoDeploy: true

  # Background worker for ASL model processing (optional)
  - type: worker
    name: asl-worker
    runtime: python
    version: "3.11"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py qcluster"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          name: asl-learning-app
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: asl-db
          property: connectionString
    autoDeploy: true

  # Static file serving via CDN
  - type: static
    name: asl-static
    buildCommand: "python manage.py collectstatic --noinput"
    publishPath: ./staticfiles
    headers:
      - path: "*"
        name: Cache-Control
        value: public, max-age=31536000

databases:
  - name: asl-db
    databaseName: asl_learning
    user: asl_admin
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
